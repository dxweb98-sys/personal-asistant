services:
  postgres:
    image: postgres:17-alpine
    container_name: freedom-debt-postgres
    environment:
      POSTGRES_USER: freedom
      POSTGRES_PASSWORD: freedom
      POSTGRES_DB: freedom_debt
    ports:
      - "5432:5432"
    volumes:
      - freedom_debt_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freedom -d freedom_debt"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  freedom_debt_data:
